# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md from conventional commits, oriented at pgmt *users*:
# features, fixes, and performance work surface; refactors, chores, tests, CI,
# style, and dependency bumps are filtered out. Non-conventional commits are
# dropped entirely.

[changelog]
# Keep a Changelog (https://keepachangelog.com) style header.
header = """
# Changelog

All notable, user-facing changes to pgmt are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
\n
"""
# One section per release; groups within, most recent release first.
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
# Drop anything that isn't a conventional commit (merges, early ad-hoc messages).
filter_unconventional = true
# Drop commits that don't match a kept group below.
filter_commits = true
# Only treat real vX.Y.Z tags as release boundaries — ignore the moving `v0`
# major-version pointer that the release workflow force-pushes.
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
protect_breaking_commits = true
sort_commits = "newest"

# Turn "(#123)" PR references into links.
commit_preprocessors = [
  { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/gdpotter/pgmt/pull/${1}))" },
]

# Order is significant: first match wins. The `<!-- N -->` prefixes only control
# group sort order and are stripped by `striptags` in the template.
commit_parsers = [
  # Drop pure formatting/lint commits even when mislabeled as fix/feat.
  { message = "(?i)^\\w+(\\(.*\\))?!?: ?(prettier|fmt|lint|formatting|web formatting)$", skip = true },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^docs", skip = true },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^style", skip = true },
  { message = "^cleanup", skip = true },
  # Catch-all: anything else is not user-facing.
  { message = ".*", skip = true },
]
