name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['web/**']
  pull_request:
    paths-ignore: ['web/**']

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  sqlx-metadata:
    name: Validate sqlx metadata
    runs-on: ubuntu-latest

    services:
      postgres:
        image: mirror.gcr.io/library/postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.8.6 --no-default-features --features native-tls,postgres --locked

      - name: Regenerate sqlx metadata
        run: cargo sqlx prepare --workspace --check
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (PostgreSQL ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: [13-alpine, 14-alpine, 15-alpine, 16-alpine, 17-alpine, 18-alpine]
    
    services:
      postgres:
        image: mirror.gcr.io/library/postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v5

      # pgmt's shadow-database tests pull postgres images via bollard using the
      # bare Docker Hub names (postgres:18-alpine, postgres:14-alpine). Pre-pull
      # those tags from Google's Docker Hub mirror (mirror.gcr.io, no auth and no
      # rate limits) and retag them locally so the tests find them via
      # inspect_image and never hit Docker Hub. This keeps CI working on fork
      # PRs, which can't authenticate to Docker Hub.
      # Keep this tag list in sync with the images used in tests/component/docker.rs.
      - name: Pre-pull shadow-DB images
        run: |
          for tag in 18-alpine 14-alpine; do
            docker pull mirror.gcr.io/library/postgres:$tag
            docker tag mirror.gcr.io/library/postgres:$tag postgres:$tag
          done

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Build release
        run: cargo build --release